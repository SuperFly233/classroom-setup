<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>机房配置器 · Ikokei</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg: #08080f;
–panel: #0f0f1a;
–card: #13131f;
–border: #1c1c2e;
–border2: #252538;
–accent: #60efff;
–accent-dim: rgba(96,239,255,0.12);
–accent-border: rgba(96,239,255,0.25);
–purple: #b57bee;
–purple-dim: rgba(181,123,238,0.12);
–green: #3effa0;
–green-dim: rgba(62,255,160,0.1);
–red: #ff6b6b;
–red-dim: rgba(255,107,107,0.1);
–yellow: #ffd060;
–text: #dde1f0;
–muted: #52536b;
–muted2: #3a3b52;
}

html { scroll-behavior: smooth; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Outfit’, sans-serif;
min-height: 100vh;
overflow-x: hidden;
}

.bg-glow {
position: fixed; inset: 0; pointer-events: none; z-index: 0;
background:
radial-gradient(ellipse 700px 500px at 15% 10%, rgba(96,239,255,0.04) 0%, transparent 60%),
radial-gradient(ellipse 500px 500px at 85% 80%, rgba(181,123,238,0.04) 0%, transparent 60%);
}
.bg-grid {
position: fixed; inset: 0; pointer-events: none; z-index: 0;
background-image:
linear-gradient(var(–border) 1px, transparent 1px),
linear-gradient(90deg, var(–border) 1px, transparent 1px);
background-size: 32px 32px;
opacity: 0.5;
}

header {
position: fixed; top: 0; left: 0; right: 0; z-index: 100;
border-bottom: 1px solid var(–border);
background: rgba(8,8,15,0.9);
backdrop-filter: blur(16px);
padding: 0 2rem;
height: 52px;
display: flex; align-items: center; justify-content: space-between;
}
.logo {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.82rem; font-weight: 600;
color: var(–accent); letter-spacing: 0.05em;
}
.logo em { color: var(–muted); font-style: normal; }
.header-btns { display: flex; gap: 0.5rem; }

.layout {
position: relative; z-index: 1;
display: grid;
grid-template-columns: 1fr 360px;
min-height: 100vh;
padding-top: 52px;
}

.editor {
padding: 2rem 2rem 4rem;
border-right: 1px solid var(–border);
overflow-y: auto;
}

.sidebar {
padding: 1.5rem;
display: flex; flex-direction: column; gap: 1.2rem;
position: sticky; top: 52px;
height: calc(100vh - 52px);
overflow-y: auto;
}

/* Section */
.sec-head {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 0.75rem;
}
.sec-title {
font-size: 0.68rem; font-weight: 600;
letter-spacing: 0.14em; text-transform: uppercase;
color: var(–muted);
display: flex; align-items: center; gap: 8px;
}
.sec-title::before {
content: ‘’; display: block;
width: 12px; height: 2px;
background: linear-gradient(90deg, var(–accent), var(–purple));
border-radius: 2px;
}

.card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 12px;
margin-bottom: 1.75rem;
overflow: hidden;
}
.card:last-child { margin-bottom: 0; }

/* GitHub fields */
.gh-grid {
display: grid; grid-template-columns: 1fr 1fr;
gap: 0;
}
.gh-field {
padding: 0.9rem 1.1rem;
border-right: 1px solid var(–border);
border-bottom: 1px solid var(–border);
}
.gh-field:nth-child(2n) { border-right: none; }
.gh-field:nth-last-child(-n+2) { border-bottom: none; }
.gh-label {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.65rem; color: var(–muted);
margin-bottom: 4px; display: block;
}
.gh-input {
background: transparent; border: none;
color: var(–text);
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.8rem; width: 100%; outline: none;
padding: 2px 0;
}
.gh-input::placeholder { color: var(–muted2); }
.gh-input:focus { color: var(–accent); }

/* App / site rows */
.items { display: flex; flex-direction: column; }

.row {
display: grid;
gap: 0;
border-bottom: 1px solid var(–border);
transition: background 0.15s;
position: relative;
}
.row:last-child { border-bottom: none; }
.row:hover { background: rgba(255,255,255,0.015); }
.row.disabled { opacity: 0.35; }
.row.app-row  { grid-template-columns: 160px 1fr auto; }
.row.site-row { grid-template-columns: 140px 1fr auto; }

.cell {
padding: 0.7rem 1rem;
border-right: 1px solid var(–border);
display: flex; align-items: center;
}
.cell:last-child { border-right: none; }

.cell-input {
background: transparent; border: none;
color: var(–text); font-family: ‘Outfit’, sans-serif;
font-size: 0.84rem; width: 100%; outline: none;
}
.cell-input.mono {
font-family: ‘JetBrains Mono’, monospace;
font-size: 0.73rem; color: var(–muted);
}
.cell-input.mono:focus { color: var(–text); }
.cell-input::placeholder { color: var(–muted2); }

.cell-actions {
padding: 0 0.6rem; gap: 2px;
justify-content: center;
}

.ico {
width: 26px; height: 26px; border-radius: 5px;
border: 1px solid transparent; background: transparent;
display: flex; align-items: center; justify-content: center;
cursor: pointer; font-size: 0.78rem; color: var(–muted);
transition: all 0.13s;
}
.ico:hover { border-color: var(–border2); background: var(–panel); color: var(–text); }
.ico.del:hover { border-color: rgba(255,107,107,0.3); background: var(–red-dim); color: var(–red); }
.ico.on  { color: var(–green); }
.ico.off { color: var(–muted2); }

.col-header {
display: grid;
border-bottom: 1px solid var(–border);
background: rgba(255,255,255,0.02);
padding: 0;
}
.col-header.app-row  { grid-template-columns: 160px 1fr auto; }
.col-header.site-row { grid-template-columns: 140px 1fr auto; }
.col-h {
padding: 0.4rem 1rem;
font-size: 0.65rem; color: var(–muted2);
font-family: ‘JetBrains Mono’, monospace;
letter-spacing: 0.06em;
border-right: 1px solid var(–border);
}
.col-h:last-child { border-right: none; }

.add-row-btn {
display: flex; align-items: center; justify-content: center;
padding: 0.6rem;
cursor: pointer; color: var(–muted2);
font-size: 0.8rem; gap: 6px;
border-top: 1px solid var(–border);
transition: all 0.15s;
}
.add-row-btn:hover { background: rgba(255,255,255,0.02); color: var(–muted); }

/* 按钮 */
.btn {
display: inline-flex; align-items: center; gap: 5px;
padding: 6px 12px; border-radius: 7px; border: 1px solid;
font-family: ‘Outfit’, sans-serif; font-size: 0.8rem; font-weight: 500;
cursor: pointer; transition: all 0.13s; white-space: nowrap;
}
.btn-ghost  { background: transparent; border-color: var(–border2); color: var(–muted); }
.btn-ghost:hover { border-color: var(–muted); color: var(–text); }
.btn-accent { background: var(–accent-dim); border-color: var(–accent-border); color: var(–accent); }
.btn-accent:hover { background: rgba(96,239,255,0.2); }
.btn-purple { background: var(–purple-dim); border-color: rgba(181,123,238,0.28); color: var(–purple); }
.btn-purple:hover { background: rgba(181,123,238,0.22); }
.btn-sm { padding: 4px 10px; font-size: 0.75rem; }

/* Sidebar output */
.out-label {
font-size: 0.65rem; font-family: ‘JetBrains Mono’, monospace;
color: var(–muted); letter-spacing: 0.1em; text-transform: uppercase;
margin-bottom: 0.4rem;
}

.cmd-box {
background: var(–card); border: 1px solid var(–border); border-radius: 10px; overflow: hidden;
}
.cmd-bar {
display: flex; align-items: center; justify-content: space-between;
padding: 6px 10px; border-bottom: 1px solid var(–border);
background: rgba(255,255,255,0.02);
}
.dots { display: flex; gap: 4px; }
.dots i { width: 8px; height: 8px; border-radius: 50%; }
.dots i:nth-child(1) { background: #ff5f57; }
.dots i:nth-child(2) { background: #febc2e; }
.dots i:nth-child(3) { background: #28c840; }
.cmd-ps { font-family:‘JetBrains Mono’,monospace; font-size:0.62rem; color:var(–muted); }

.cmd-text {
padding: 0.8rem 0.9rem;
font-family: ‘JetBrains Mono’, monospace; font-size: 0.72rem;
color: var(–accent); word-break: break-all; line-height: 1.7;
user-select: all;
}
.cmd-text .kw { color: var(–purple); }
.cmd-text .str { color: var(–green); }

.action-row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
.action-btn {
flex: 1; padding: 7px 0; border-radius: 8px; border: 1px solid;
font-family: ‘Outfit’, sans-serif; font-size: 0.78rem; font-weight: 500;
cursor: pointer; transition: all 0.13s; text-align: center;
}
.ab-copy { background: var(–accent-dim); border-color: var(–accent-border); color: var(–accent); }
.ab-copy:hover { background: rgba(96,239,255,0.2); }
.ab-copy.ok { background: var(–green-dim); border-color: rgba(62,255,160,0.3); color: var(–green); }
.ab-dl { background: var(–purple-dim); border-color: rgba(181,123,238,0.28); color: var(–purple); }
.ab-dl:hover { background: rgba(181,123,238,0.22); }

.script-wrap {
flex: 1; display: flex; flex-direction: column; min-height: 0;
}
.script-box {
background: var(–card); border: 1px solid var(–border); border-radius: 10px;
flex: 1; overflow: hidden; display: flex; flex-direction: column;
}
.script-pre {
flex: 1; overflow-y: auto; padding: 0.9rem;
font-family: ‘JetBrains Mono’, monospace; font-size: 0.67rem; line-height: 1.75;
color: var(–muted); white-space: pre; max-height: 240px;
}
.script-pre .kw  { color: var(–accent); }
.script-pre .str { color: var(–green); }
.script-pre .cm  { color: var(–muted2); }
.script-pre .fn  { color: var(–purple); }

.tip {
background: rgba(255,208,96,0.05);
border: 1px solid rgba(255,208,96,0.15);
border-radius: 8px; padding: 0.7rem 0.9rem;
font-size: 0.76rem; color: var(–yellow); line-height: 1.6;
}
.tip code {
font-family: ‘JetBrains Mono’, monospace; font-size: 0.68rem;
background: rgba(255,208,96,0.1); padding: 1px 4px; border-radius: 3px;
}

@keyframes fadeIn {
from { opacity: 0; transform: translateY(-4px); }
to   { opacity: 1; transform: translateY(0); }
}
.row { animation: fadeIn 0.2s ease; }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(–border2); border-radius: 4px; }

@media (max-width: 860px) {
.layout { grid-template-columns: 1fr; }
.sidebar { position: static; height: auto; border-top: 1px solid var(–border); }
}
</style>

</head>

<script>
// ─── 默认数据 ───────────────────────────────────────────────
const DEFAULTS = {
  ghUser:   'SuperFly233',
  ghRepo:   'classroom-setup',
  ghBranch: 'main',
  ghProxy:  'https://ghfast.top/',
  apps: [
    { name: 'WPS Office',     url: 'https://wdl1.pcfg.cache.wpscdn.cn/wpsdl/wpsoffice/download/wps_office_free.exe', args: '/S /v/qn', detect: 'C:\\Program Files (x86)\\Kingsoft\\WPS Office', on: true },
    { name: 'PixPin',         url: 'https://download.pixpinapp.com/PixPin_latest.exe',                                args: '/S',       detect: '%LOCALAPPDATA%\\PixPin\\PixPin.exe',             on: true },
    { name: 'OCS 超星客户端', url: 'https://mooc1.chaoxing.com/softdownload/ocsclient/OCS.exe',                       args: '/S',       detect: 'C:\\Program Files (x86)\\OCS\\OCS.exe',           on: true },
  ],
  sites: [
    { name: '超星学习通',   url: 'https://mooc1.chaoxing.com',   on: true },
    { name: '内网实训平台', url: 'http://10.174.234.251:85/',     on: true },
  ]
};

let S = clone(DEFAULTS);
function clone(o) { return JSON.parse(JSON.stringify(o)); }

// ─── 初始化 ────────────────────────────────────────────────
window.onload = () => {
  try { const s = localStorage.getItem('cfg'); if (s) S = JSON.parse(s); } catch(e) {}
  syncFields(); renderAll();
};

function syncFields() {
  $('ghUser').value   = S.ghUser;
  $('ghRepo').value   = S.ghRepo;
  $('ghBranch').value = S.ghBranch;
  $('ghProxy').value  = S.ghProxy;
}
function $(id) { return document.getElementById(id); }
function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── 读字段 ────────────────────────────────────────────────
function readFields() {
  S.ghUser   = $('ghUser').value.trim();
  S.ghRepo   = $('ghRepo').value.trim()   || 'classroom-setup';
  S.ghBranch = $('ghBranch').value.trim() || 'main';
  S.ghProxy  = $('ghProxy').value.trim()  || 'https://ghfast.top/';
}

// ─── 渲染列表 ──────────────────────────────────────────────
function renderAll() { renderApps(); renderSites(); renderOutput(); }

function renderApps() {
  $('appList').innerHTML = S.apps.map((a,i) => `
    <div class="row app-row${a.on?'':' disabled'}">
      <div class="cell">
        <input class="cell-input" placeholder="软件名称" value="${esc(a.name)}"
          oninput="S.apps[${i}].name=this.value;renderOutput()">
      </div>
      <div class="cell">
        <input class="cell-input mono" placeholder="https://...exe" value="${esc(a.url)}"
          oninput="S.apps[${i}].url=this.value;renderOutput()">
      </div>
      <div class="cell cell-actions" style="display:flex;justify-content:center;gap:2px;padding:0 8px">
        <button class="ico ${a.on?'on':'off'}" title="${a.on?'禁用':'启用'}" onclick="toggleApp(${i})">●</button>
        <button class="ico del" title="删除" onclick="delApp(${i})">✕</button>
      </div>
    </div>`).join('');
}

function renderSites() {
  $('siteList').innerHTML = S.sites.map((s,i) => `
    <div class="row site-row${s.on?'':' disabled'}">
      <div class="cell">
        <input class="cell-input" placeholder="网站名称" value="${esc(s.name)}"
          oninput="S.sites[${i}].name=this.value;renderOutput()">
      </div>
      <div class="cell">
        <input class="cell-input mono" placeholder="https://..." value="${esc(s.url)}"
          oninput="S.sites[${i}].url=this.value;renderOutput()">
      </div>
      <div class="cell cell-actions" style="display:flex;justify-content:center;gap:2px;padding:0 8px">
        <button class="ico ${s.on?'on':'off'}" title="${s.on?'禁用':'启用'}" onclick="toggleSite(${i})">●</button>
        <button class="ico del" title="删除" onclick="delSite(${i})">✕</button>
      </div>
    </div>`).join('');
}

// ─── 增删切换 ──────────────────────────────────────────────
function addApp()  { S.apps.push({name:'',url:'',args:'/S',detect:'',on:true}); renderAll(); }
function delApp(i) { S.apps.splice(i,1); renderAll(); }
function toggleApp(i)  { S.apps[i].on=!S.apps[i].on; renderAll(); }

function addSite()  { S.sites.push({name:'',url:'',on:true}); renderAll(); }
function delSite(i) { S.sites.splice(i,1); renderAll(); }
function toggleSite(i) { S.sites[i].on=!S.sites[i].on; renderAll(); }

function resetAll() {
  if (!confirm('恢复默认配置？当前改动会丢失。')) return;
  S = clone(DEFAULTS); syncFields(); renderAll();
  localStorage.removeItem('cfg');
}

// ─── 生成脚本 ──────────────────────────────────────────────
function buildScript() {
  const apps  = S.apps.filter(a => a.on && a.url);
  const sites = S.sites.filter(s => s.on && s.url);

  const appBlocks = apps.map(a => `
Install-App \`
    -Name "${a.name||'未命名'}" \`
    -Url "${a.url}" \`
    -Args "${a.args||'/S'}" \`
    -DetectPath "${a.detect||''}"
`).join('');

  const siteArr = sites.length
    ? sites.map(s => `    "${s.url}"${s.name?' # '+s.name:''}`).join(',\n')
    : '    # 未配置网站';

  return `# ============================================================
#  机房一键装软件 · setup.ps1  by Ikokei
# ============================================================

$Host.UI.RawUI.WindowTitle = "机房一键装软件 · Ikokei"

function Write-Ok($m)   { Write-Host "  OK $m" -ForegroundColor Green }
function Write-Step($m) { Write-Host "  >> $m" -ForegroundColor Yellow }
function Write-Skip($m) { Write-Host "  -- $m" -ForegroundColor DarkGray }
function Write-Err($m)  { Write-Host "  !! $m" -ForegroundColor Red }

function Install-App {
    param([string]$Name,[string]$Url,[string]$Args="/S",[string]$DetectPath="")
    if ($DetectPath -and (Test-Path ([System.Environment]::ExpandEnvironmentVariables($DetectPath)))) {
        Write-Skip "$Name 已安装，跳过"; return
    }
    Write-Step "下载 $Name ..."
    $tmp = "$env:TEMP\\ikokei_$Name.exe"
    try { (New-Object System.Net.WebClient).DownloadFile($Url, $tmp) }
    catch { Write-Err "$Name 下载失败: $($_.Exception.Message)"; return }
    Write-Step "安装 $Name ..."
    try { Start-Process -FilePath $tmp -ArgumentList $Args -Wait; Write-Ok "$Name 完成" }
    catch { Write-Err "$Name 安装失败: $($_.Exception.Message)" }
    Remove-Item $tmp -Force -ErrorAction SilentlyContinue
}

Clear-Host
Write-Host "  ==============================================" -ForegroundColor Cyan
Write-Host "     机房一键装软件  by Ikokei" -ForegroundColor Cyan
Write-Host "  ==============================================" -ForegroundColor Cyan
Write-Host ""
Write-Host "  [ 软件安装 ]" -ForegroundColor Cyan
${appBlocks}
Write-Host "  [ 打开网站 ]" -ForegroundColor Cyan
Write-Step "打开网站..."
@(
${siteArr}
) | ForEach-Object { Start-Process $_; Start-Sleep -Milliseconds 400 }
Write-Ok "网站已打开"
Write-Host ""
Write-Host "  ==============================================" -ForegroundColor Cyan
Write-Host "     全部完成！祝上课顺利 (o w o)" -ForegroundColor Cyan
Write-Host "  ==============================================" -ForegroundColor Cyan
Write-Host ""
$null = $Host.UI.RawUI.ReadKey("NoEcho,IncludeKeyDown")
`;
}

function buildCmd() {
  const u = S.ghUser||'YOUR_USERNAME', r = S.ghRepo||'classroom-setup';
  const b = S.ghBranch||'main';
  let p = S.ghProxy||'https://ghfast.top/';
  if (!p.endsWith('/')) p += '/';
  return `irm '${p}https://raw.githubusercontent.com/${u}/${r}/${b}/setup.ps1' | iex`;
}

// ─── 渲染输出 ──────────────────────────────────────────────
function renderOutput() {
  readFields(); save();

  const cmd = buildCmd();
  $('cmdOut').innerHTML = cmd
    .replace(/irm/, '<span class="kw">irm</span>')
    .replace(/('[^']+')/, '<span class="str">$1</span>')
    .replace(/\| iex/, '| <span class="kw">iex</span>');

  const raw = buildScript()
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(#[^\n]+)/g, '<span class="cm">$1</span>')
    .replace(/\b(function|param|return|if|ForEach-Object|try|catch)\b/g, '<span class="kw">$1</span>')
    .replace(/(Install-App|Write-Ok|Write-Step|Write-Skip|Write-Err)/g, '<span class="fn">$1</span>')
    .replace(/("[^"]*")/g, '<span class="str">$1</span>');
  $('scriptPre').innerHTML = raw;
}

function render() { renderOutput(); }

function save() {
  try { localStorage.setItem('cfg', JSON.stringify(S)); } catch(e) {}
}

// ─── 复制 & 下载 ───────────────────────────────────────────
function copyCmd() {
  navigator.clipboard.writeText(buildCmd()).then(() => {
    const b = $('copyBtn');
    b.textContent = '已复制 ✓'; b.classList.add('ok');
    setTimeout(() => { b.textContent = '复制命令'; b.classList.remove('ok'); }, 2000);
  });
}

function dlScript() {
  const blob = new Blob([buildScript()], {type:'text/plain;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'setup.ps1'; a.click();
}
</script>
